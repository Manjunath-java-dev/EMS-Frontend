<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="login-container">

        <h1>Create Account</h1>
        <form>

            <label for="name">Name</label>
            <input id="name" type="text" placeholder="Enter your name" autocomplete="off">

            <label for="email" autocomplete="off">Email</label>
            <input id="email" type="email" placeholder="Enter your email" autocomplete="off">

            <label for="password">Password</label>

            <div class="password-box">
                <input id="password" type="password" placeholder="Enter your password">
                <i id="togglePassword" class="fa-solid fa-eye toggle-password"></i>
            </div>


            <label for="address">Address</label>
            <input id="address" type="text" placeholder="Enter address" autocomplete="off">

            <label for="phone">Phone</label>
            <input id="phone" type="text" placeholder="Enter phone number" autocomplete="off">

            <br><br>

            <button id="signupBtn" type="submit">
                Signup
            </button>

        </form>

        <a href="login.html">
            Already have an account? Login
        </a>




    </div>

    <script src="signup.js"></script>

</body>

</html>
